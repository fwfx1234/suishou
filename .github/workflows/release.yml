name: Build Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-14
            artifact: release-macos
          - name: Windows
            os: windows-2022
            artifact: release-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --group build

      - name: Python syntax check
        run: uv run python -m compileall src

      - name: Build macOS app
        if: runner.os == 'macOS'
        run: bash tools/build_macos.sh

      - name: Package macOS app
        if: runner.os == 'macOS'
        run: |
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent dist/PyDesktopTools.app "release/PyDesktopTools-${GITHUB_REF_NAME}-macos.zip"

      - name: Build Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        run: tools\build_windows.ps1

      - name: Package Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Compress-Archive -Path dist\PyDesktopTools -DestinationPath "release\PyDesktopTools-${env:GITHUB_REF_NAME}-windows.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          ls -la release-assets
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG_NAME" release-assets/* --repo "$GITHUB_REPOSITORY" --title "$TAG_NAME" --generate-notes
          fi
