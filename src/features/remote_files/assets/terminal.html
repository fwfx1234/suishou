<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="xterm/xterm.css">
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script src="xterm/xterm.js"></script>
  <script src="xterm/xterm-addon-fit.js"></script>
  <style>
    :root {
      color-scheme: light dark;
      --term-bg: #FFFFFF;
      --term-fg: #1B1D22;
      --term-cursor: #0A84FF;
      --term-selection: #B5D5FF;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --term-bg: #101014;
        --term-fg: #E5E7EB;
        --term-cursor: #38BDF8;
        --term-selection: #334155;
      }
    }
    html, body, #terminal {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--term-bg);
    }
    .xterm-viewport {
      background-color: var(--term-bg) !important;
    }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <script>
    function readVar(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }
    function currentTheme() {
      return {
        background: readVar('--term-bg') || '#FFFFFF',
        foreground: readVar('--term-fg') || '#1B1D22',
        cursor: readVar('--term-cursor') || '#0A84FF',
        cursorAccent: readVar('--term-bg') || '#FFFFFF',
        selectionBackground: readVar('--term-selection') || '#B5D5FF'
      };
    }

    const term = new Terminal({
      cursorBlink: true,
      convertEol: true,
      fontFamily: 'SF Mono, Menlo, Consolas, monospace',
      fontSize: 13,
      scrollback: 8000,
      fastScrollModifier: 'alt',
      fastScrollSensitivity: 5,
      scrollSensitivity: 1,
      theme: currentTheme()
    });
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));

    let bridge = null;
    function fitTerminal() {
      try {
        fitAddon.fit();
      } catch (e) {}
      if (bridge && bridge.resize) {
        bridge.resize(term.cols || 80, term.rows || 24);
      }
    }

    function applyTheme() {
      term.options.theme = currentTheme();
    }

    if (window.matchMedia) {
      const mql = window.matchMedia('(prefers-color-scheme: dark)');
      try {
        mql.addEventListener('change', applyTheme);
      } catch (e) {
        mql.addListener && mql.addListener(applyTheme);
      }
    }

    let pendingOutput = '';
    let writeScheduled = false;
    let writeInProgress = false;
    const maxWriteChunk = 65536;

    function scheduleFlush() {
      if (writeScheduled || writeInProgress) return;
      writeScheduled = true;
      window.requestAnimationFrame(flushOutput);
    }

    function flushOutput() {
      writeScheduled = false;
      if (writeInProgress || pendingOutput.length === 0) return;
      const chunk = pendingOutput.length > maxWriteChunk
        ? pendingOutput.slice(0, maxWriteChunk)
        : pendingOutput;
      pendingOutput = pendingOutput.slice(chunk.length);
      writeInProgress = true;
      term.write(chunk, function() {
        writeInProgress = false;
        if (pendingOutput.length > 0) {
          window.setTimeout(scheduleFlush, 0);
        }
      });
    }

    function writeOutput(text) {
      const chunk = text || '';
      if (!chunk) return;
      pendingOutput += chunk;
      scheduleFlush();
    }

    writeOutput('SSH terminal ready\r\n');
    new QWebChannel(qt.webChannelTransport, function(channel) {
      bridge = channel.objects.remoteTerminalBridge;
      if (!bridge) {
        writeOutput('Remote terminal bridge unavailable\r\n');
        return;
      }
      bridge.output.connect(function(text) {
        writeOutput(text || '');
      });
      bridge.closed.connect(function(message) {
        writeOutput('\r\n[closed] ' + (message || '') + '\r\n');
      });
      term.onData(function(data) {
        bridge.sendInput(data);
      });
      fitTerminal();
    });

    window.addEventListener('resize', fitTerminal);
    setTimeout(fitTerminal, 100);
  </script>
</body>
</html>
